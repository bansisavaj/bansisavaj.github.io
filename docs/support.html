<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SplitChaos Support</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c0c10;
      --panel: #1a1a21;
      --panel-2: #22222b;
      --text: #f5f5f7;
      --muted: #a1a1ad;
      --accent: #ff4d7d;
      --border: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 77, 125, 0.16), transparent 34%),
        linear-gradient(180deg, #121218, #0c0c10 44%, #09090c);
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 40px;
    }
    .hero {
      padding: 18px 0 20px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 77, 125, 0.12);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    h1, h2 { line-height: 1.2; margin: 0; }
    h1 { margin-top: 14px; font-size: 34px; }
    h2 { margin-bottom: 10px; font-size: 20px; }
    p { margin: 0 0 16px; color: var(--text); }
    .muted { color: var(--muted); }
    label { display: block; margin: 16px 0 6px; font-weight: 600; }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font: inherit;
      background: #111116;
      color: var(--text);
    }
    input::placeholder, textarea::placeholder { color: #757580; }
    textarea { min-height: 160px; resize: vertical; }
    button {
      margin-top: 16px;
      padding: 12px 18px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, #ff4d7d, #ff6d4d);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      margin-top: 18px;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
    }
    .stack {
      display: grid;
      gap: 18px;
    }
    .mini {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .mini div {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
    }
    .mini strong {
      display: block;
      color: var(--accent);
      margin-bottom: 4px;
    }
    @media (max-width: 640px) {
      h1 { font-size: 28px; }
      .mini { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <span class="eyebrow">SplitChaos Support</span>
      <h1>Need a hand?</h1>
      <p class="muted">Send us a message and your mail app will open ready to go.</p>
      <div class="mini">
        <div><strong>Email</strong>bansisavaj121@gmail.com</div>
        <div><strong>Style</strong>Fast replies</div>
        <div><strong>Help</strong>Bugs, feedback, issues</div>
      </div>
    </div>

    <div class="card">
      <form id="supportForm" class="stack">
        <div>
          <label for="name">Your name</label>
          <input id="name" name="name" type="text" placeholder="Optional" />
        </div>

        <div>
          <label for="email">Your email</label>
          <input id="email" name="email" type="email" placeholder="Optional" />
        </div>

        <div>
          <label for="phone">Mobile number</label>
          <input id="phone" name="phone" type="tel" placeholder="Optional" />
        </div>

        <div>
          <label for="message">Description</label>
          <textarea id="message" name="message" placeholder="Tell us what happened or what you need help with..."></textarea>
        </div>

        <button type="submit">Send support email</button>
      </form>
    </div>

    <div class="card">
      <h2>Direct contact</h2>
      <p>
        Email: <a href="mailto:bansisavaj121@gmail.com">bansisavaj121@gmail.com</a>
      </p>
      <p class="muted">
        Privacy Policy: <a href="https://bansisavaj.github.io/privacy.html">privacy.html</a><br>
        Terms of Use: <a href="https://bansisavaj.github.io/terms.html">terms.html</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('supportForm').addEventListener('submit', function (event) {
      event.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const message = document.getElementById('message').value.trim();

      const subject = encodeURIComponent('SplitChaos Support');
      const body = encodeURIComponent(
        `${name ? `Name: ${name}\n` : ''}` +
        `${email ? `Email: ${email}\n` : ''}` +
        `${phone ? `Mobile: ${phone}\n` : ''}` +
        `\n${message || 'No message entered.'}`
      );

      window.location.href = `mailto:bansisavaj121@gmail.com?subject=${subject}&body=${body}`;
    });
  </script>
</body>
</html>
